<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Dropdown (Dependent Dropdown)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="col-md-8 mx-auto">
            <div class="mb-4 position-relative text-center">
                <h2 class="mb-0">Dynamic Dropdown (Dependent Dropdown)</h2>
                <a href="index.php" class="btn btn-secondary position-absolute top-0 end-0">Home</a>
            </div>
            <form action="" class="form-control">
                <label for="country">Country</label>
                <select name="country" id="country" class="form-group">
                    <option value="">Select Country</option>
                    <option value="india">India</option>
                    <option value="usa">USA</option>
                </select>

                <select id="city"></select>

            </form>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        let data = {
            india: ["Delhi", "Mumbai"],
            usa: ["NY", "LA"]
        };

        $("#country").change(function (e) { 
            // e.preventDefault();

            let val = $(this).val();
            $("#city").html("");

            if(data[val]){
                data[val].forEach(city => {
                    $("#city").append(`<option>${city}</option>`);
                });
            }
        });
    </script>
</body>
</html>
