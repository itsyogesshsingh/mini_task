<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="col-md-8 mx-auto">
            <div class="mb-4 position-relative text-center">
                <h2 class="mb-0">Toggle </h2>
                <a href="index.php" class="btn btn-secondary position-absolute top-0 end-0">Home</a>
            </div>
            <!-- <form action="" class="form-control"> -->
                <input type="password" id="pass">
                <button id="toggle">Show</button>
            <!-- </form> -->
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $("#toggle").click(function (e) { 
            let type = $("#pass").attr("type");
            $("#pass").attr("type", type === "password" ? "text" : "password");
        });
    </script>
</body>
</html>
