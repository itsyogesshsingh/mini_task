<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
        }
        #count {
        font-size: 40px;
        margin: 20px;
        }
        button {
        padding: 10px 20px;
        font-size: 18px;
        margin: 5px;
        cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="col-md-8 mx-auto">
            <div class="mb-4 position-relative text-center">
                <h1>Ecom App</h1>
                <a href="index.php" class="btn btn-secondary position-absolute top-0 end-0">Home</a>
            </div>

            <h2>Price: ₹<span id="price">100</span></h2>

            <div class="cart">
                <button id="minus">-</button>
                <span id="qty">1</span>
                <button id="plus">+</button>
            </div>

            <h3>Total: ₹<span id="total">100</span></h3>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        let qty = 1;
        let price = 100;

        function updateTotal() {
            $("#qty").text(qty);
            $("#total").text(qty * price);
        }

        $("#plus").click(function () {
            qty++;
            updateTotal();
        });

        $("#minus").click(function () {
            if (qty > 1) {
                qty--;
                updateTotal();
            }
        });
    </script>
</body>
</html>
