<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
        }
        #count {
        font-size: 40px;
        margin: 20px;
        }
        button {
        padding: 10px 20px;
        font-size: 18px;
        margin: 5px;
        cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="col-md-8 mx-auto">
            <div class="mb-4 position-relative text-center">
                <h1>Ecom App</h1>
                <a href="index.php" class="btn btn-secondary position-absolute top-0 end-0">Home</a>
            </div>

            <div class="item" data-price="100">
                <h4>Product A</h4>
                <button class="minus">-</button>
                <span class="qty">1</span>
                <button class="plus">+</button>
            </div>

            <div class="item" data-price="200">
                <h4>Product B</h4>
                <button class="minus">-</button>
                <span class="qty">1</span>
                <button class="plus">+</button>
            </div>

            <h2>Total Cart: ₹<span id="cartTotal">300</span></h2>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function updateCart() {
            let total = 0;

            $(".item").each(function () {
                let price = parseInt($(this).data("price"));
                let qty = parseInt($(this).find(".qty").text());

                total += price * qty;
            });
            $("#cartTotal").text(total);
        }

        $(".plus").click(function () {
            let qtyEl = $(this).siblings(".qty");
            let qty = parseInt(qtyEl.text());

            qtyEl.text(qty + 1);
            updateCart();
        });

        $(".minus").click(function () {
            let qtyEl = $(this).siblings(".qty");
            let qty = parseInt(qtyEl.text());

            if (qty > 1) {
                qtyEl.text(qty - 1);
                updateCart();
            }
        });
    </script>
</body>
</html>
