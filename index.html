<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="col-md-8 mx-auto">
            <h2 class="mb-4">TODO App</h2>
            <!-- Input -->
            <div class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
                <div id="message" class="text-danger mt-2"></div>
                <button class="btn btn-primary" id="addTask">Add</button>
            </div>

            <!-- Table -->
            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th width="120">Action</th>
                        </tr>
                    </thead>
                    <tbody id="taskTable">
                        <!-- Tasks will appear here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-8 mx-auto">
            <h2 class="mb-4">Drop Down</h2>
            
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            loadTasks();
                $("#addTask").click(function () {

                let task = $("#taskInput").val().trim();
                if (task === "") {
                    $("#message").text("Please enter a task");
                    return;
                } else {
                    $("#message").text("");
                }
                saveTask(task);
                addTaskDOM(task);
                $("#taskInput").val("");
            });

             // Delete task
            $(document).on("click", ".deleteBtn", function () {
                let taskText = $(this).closest("tr").find("td:first").text();
                $(this).closest("tr").remove();
                deleteTask(taskText);
            });

            // edit
            $(document).on("click", ".editBtn", function () {
                let row = $(this).closest("tr");
                let taskTd = row.find(".task-text");
                let oldTask = taskTd.text();

                taskTd.html(`<input type="text" class="form-control editInput" value="${oldTask}">`);

                $(this)
                    .removeClass("editBtn btn-dark")
                    .addClass("saveBtn btn-success")
                    .text("Save");
            });

            // save
            $(document).on("click", ".saveBtn", function () {
                let row = $(this).closest("tr");
                let input = row.find(".editInput");
                let newTask = input.val().trim();
                let oldTask = input.attr("value");

                if (newTask === "") {
                    $("#message").text("Task cannot be empty");
                    return;
                }

                $("#message").text("");

                // Update DOM
                row.find(".task-text").text(newTask);

                // Update localStorage
                updateTask(oldTask, newTask);
                $(this).removeClass("saveBtn btn-success").addClass("editBtn btn-dark").text("Edit");

            });
        });

        function saveTask(task) {
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            tasks.push(task);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function updateTask(oldTask, newTask) {
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            tasks = tasks.map(task => task === oldTask ? newTask : task);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function loadTasks() { 
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

            tasks.forEach(task => {
                addTaskDOM(task);
            });
        }

        function addTaskDOM(task) { 
            let row = `
                <tr>
                    <td class="task-text">${task}</td>
                    <td>
                        <a class="btn btn-dark btn-sm editBtn" href="javascript:void(0);">Edit</a>
                        <button class="btn btn-danger btn-sm deleteBtn">Delete</button>
                    </td>
                </tr>
            `;

            $("#taskTable").append(row);
        }

        function deleteTask(taskToDelete) {
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            tasks = tasks.filter(task => task !== taskToDelete);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }
    </script>
</body>
</html>
